<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nova guia</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Inter', sans-serif;
    }

    body, html {
      height: 100%;
      overflow: hidden;
    }

    body {
      background: url('https://raw.githubusercontent.com/ItsOnlyMe360/Homepage/refs/heads/main/assets/explorer_e0y5pTOflD.jpg') no-repeat center center fixed;
      background-size: cover;
    }

    .glass-effect {
      background: rgba(20, 20, 20, 0.4);
      backdrop-filter: blur(15px);
      -webkit-backdrop-filter: blur(15px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      box-shadow: 0 4px 30px rgba(0, 0, 0, 0.5);
    }

    .right-panel {
      position: fixed;
      top: 30px;
      right: 40px;
      width: 320px;
      display: flex;
      flex-direction: column;
      gap: 20px;
      z-index: 10;
    }

    .clock-container {
      text-align: center;
      color: white;
      padding: 20px;
      border-radius: 20px;
      animation: fadeIn 1s ease;
      display: flex;
      flex-direction: column;
      align-items: center;
      flex-shrink: 0;
    }

    #clock-time {
      font-size: 3.8rem;
      font-weight: 600;
      line-height: 1;
      cursor: pointer;
      user-select: none;
      transition: transform 0.2s ease;
      font-variant-numeric: tabular-nums; 
      white-space: nowrap; 
    }

    #clock-time:hover {
      transform: scale(1.02);
      text-shadow: 0 0 10px rgba(255,255,255,0.3);
    }

    #clock-date {
      font-size: 1rem;
      font-weight: 300;
      opacity: 0.8;
      margin-top: 8px;
      margin-bottom: 15px;
    }

    .weather-widget {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      cursor: pointer;
      padding: 8px 20px;
      border-radius: 10px;
      transition: all 0.3s ease;
      background: rgba(255,255,255,0.05);
      width: 100%;
    }

    .weather-widget:hover {
      background: rgba(255,255,255,0.15);
      transform: scale(1.02);
    }

    .weather-widget i { font-size: 1.2rem; }
    .weather-widget span { font-size: 1.1rem; font-weight: 500; }

    .today-container {
      color: white;
      padding: 20px;
      border-radius: 20px;
      animation: fadeIn 1s ease 0.2s backwards;
      display: flex;
      flex-direction: column;
      height: 350px;
      max-height: 350px;
      overflow: hidden;
      flex-shrink: 0;
    }

    .today-title {
      font-size: 1.2rem;
      font-weight: 600;
      text-align: center;
      margin-bottom: 15px;
      padding-bottom: 10px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      user-select: none;
      flex-shrink: 0;
    }

    .today-title-content {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      flex-grow: 1;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.2s;
    }

    .today-title-content:hover {
      opacity: 0.8;
      transform: scale(1.02);
    }

    .nav-btn {
      background: none;
      border: none;
      color: white;
      cursor: pointer;
      opacity: 0.6;
      transition: opacity 0.2s, transform 0.2s;
      padding: 5px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1rem;
    }

    .nav-btn:hover:not(:disabled) {
      opacity: 1;
      transform: scale(1.2);
    }

    .nav-btn:disabled {
      opacity: 0.15;
      cursor: not-allowed;
    }

    .today-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 8px;
      overflow-y: auto;
      height: 240px;
      max-height: 240px;
      padding-right: 5px;
    }

    .today-list::-webkit-scrollbar { width: 6px; }
    .today-list::-webkit-scrollbar-track { background: transparent; }
    .today-list::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.2); border-radius: 3px; }
    .today-list::-webkit-scrollbar-thumb:hover { background: rgba(255, 255, 255, 0.4); }

    .today-list li {
      font-size: 0.85rem;
      font-weight: 400;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 10px;
      line-height: 1.3;
      transition: background 0.3s;
      overflow: hidden;
      flex-shrink: 0;
    }

    .today-list li:hover {
      background: rgba(255, 255, 255, 0.15);
    }

    .today-list li a, .today-list li .no-link {
      display: block;
      padding: 10px 12px;
      color: white;
      text-decoration: none;
    }

    .today-list li a:hover {
      text-decoration: underline;
    }

    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.5);
      backdrop-filter: blur(5px);
      z-index: 1000;
      display: flex;
      justify-content: center;
      align-items: center;
      opacity: 0;
      visibility: hidden;
      transition: opacity 0.3s ease, visibility 0.3s ease;
    }

    .modal-overlay.active {
      opacity: 1;
      visibility: visible;
    }

    .weather-modal {
      width: 650px;
      max-width: 90%;
      max-height: 90vh; 
      overflow-y: auto;
      padding: 30px;
      border-radius: 20px;
      color: white;
      position: relative;
      transform: translateY(20px);
      transition: transform 0.3s ease;
    }
    
    .weather-modal::-webkit-scrollbar { width: 8px; }
    .weather-modal::-webkit-scrollbar-track { background: transparent; }
    .weather-modal::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.2); border-radius: 4px; }

    .modal-overlay.active .weather-modal { transform: translateY(0); }

    .close-modal {
      position: absolute;
      top: 20px;
      right: 20px;
      background: none;
      border: none;
      color: white;
      font-size: 1.5rem;
      cursor: pointer;
      opacity: 0.7;
      transition: opacity 0.2s;
      z-index: 2;
    }
    
    .close-modal:hover { opacity: 1; }
    .modal-title { font-size: 1.5rem; font-weight: 600; margin-bottom: 25px; text-align: center; }

    .forecast-container {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      overflow-x: auto;
      padding-bottom: 10px;
      margin-bottom: 20px;
    }

    .forecast-container::-webkit-scrollbar { height: 8px; }
    .forecast-container::-webkit-scrollbar-track { background: rgba(255, 255, 255, 0.05); border-radius: 4px; }
    .forecast-container::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.2); border-radius: 4px; transition: background 0.3s; }
    .forecast-container::-webkit-scrollbar-thumb:hover { background: rgba(255, 255, 255, 0.4); }

    .forecast-day {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      background: rgba(255,255,255,0.05);
      padding: 15px 10px;
      border-radius: 12px;
      min-width: 80px;
      flex: 1;
    }

    .f-day-name { font-size: 0.9rem; font-weight: 600; opacity: 0.9; }
    .f-icon { font-size: 1.5rem; margin: 5px 0; }
    .f-max { color: #ffcccb; font-weight: 600; font-size: 0.9rem; }
    .f-min { color: #add8e6; font-size: 0.85rem; opacity: 0.8; }

    .events-modal {
      width: 500px;
      max-width: 90%;
      padding: 30px;
      border-radius: 20px;
      color: white;
      position: relative;
      transform: translateY(20px);
      transition: transform 0.3s ease;
      height: auto;
      overflow: visible;
    }

    .modal-overlay.active .events-modal { transform: translateY(0); }

    .modal-events-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .modal-events-list li {
      font-size: 0.95rem;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 12px;
      line-height: 1.4;
      transition: background 0.3s;
      overflow: hidden;
    }

    .modal-events-list li:hover {
      background: rgba(255, 255, 255, 0.15);
    }

    .modal-events-list li a, .modal-events-list li .no-link {
      display: block;
      padding: 12px 16px;
      color: white;
      text-decoration: none;
    }

    .modal-events-list li a:hover {
      text-decoration: underline;
    }

    .sidebar {
      animation: fadeIn 1s ease;
      position: fixed;
      left: 40px;
      top: 50%;
      transform: translateY(-50%);
      display: flex;
      flex-direction: column;
      padding: 25px;
      border-radius: 20px;
      z-index: 10;
      overflow: visible;
    }

    .sidebar-toggle-handle {
      display: none;
    }

    .quick-links {
      display: flex;
      flex-direction: column;
      gap: 15px;
    }

    .quick-links a {
      display: flex;
      align-items: center;
      gap: 15px;
      padding: 12px 20px;
      border-radius: 12px;
      color: white;
      text-decoration: none;
      font-weight: 500;
      font-size: 16px;
      transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
      background: transparent;
    }

    .quick-links a:hover {
      background: rgba(50, 50, 50, 0.2);
      transform: scale(1.1);
      box-shadow: 0 5px 15px rgba(0,0,0,0.2);
    }

    .quick-links i {
      font-size: 20px;
      width: 25px;
      text-align: center;
    }

    .sidebar-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.6);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      z-index: 999;
      opacity: 0;
      visibility: hidden;
      transition: opacity 0.4s ease, visibility 0.4s ease;
    }

    .sidebar-overlay.active {
      opacity: 1;
      visibility: visible;
    }

    .search-container {
      position: fixed;
      bottom: 50px;
      left: 50%;
      transform: translateX(-50%);
      width: 100%;
      display: flex;
      justify-content: center;
      z-index: 10;
    }

    .search-box {
      border-radius: 30px;
      padding: 8px 20px;
      display: flex;
      align-items: center;
      width: 600px;
      max-width: 90%;
      color: white;
      transition: transform 0.3s ease;
    }
    
    .search-box:focus-within {
      transform: scale(1.02);
      border-color: rgba(255, 255, 255, 0.3);
    }

    .search-box > svg {
      color: rgba(255, 255, 255, 0.7);
      width: 20px;
      height: 20px;
      min-width: 20px;
    }

    .search-box input {
      background: transparent;
      border: none;
      outline: none;
      color: white;
      font-size: 16px;
      flex: 1;
      margin: 0 15px;
    }

    .search-box input::-webkit-search-decoration,
    .search-box input::-webkit-search-cancel-button,
    .search-box input::-webkit-search-results-button,
    .search-box input::-webkit-search-results-decoration { display: none; }
    
    .icon-button {
      background: rgba(255, 255, 255, 0.1);
      border: none;
      cursor: pointer;
      position: relative;
      width: 40px; 
      height: 40px;
      border-radius: 50%;
      display: flex;
      justify-content: center;
      align-items: center;
      transition: background 0.3s ease;
      margin-left: 5px;
    }

    .icon-button:hover { background: rgba(255, 255, 255, 0.2); }

    .icon-wrapper { position: relative; width: 24px; height: 24px; }

    .icon-wrapper svg {
      position: absolute; top: 0; left: 0;
      transition: transform 0.4s ease, opacity 0.4s ease;
      opacity: 0; transform: rotate(-180deg);
      color: white; width: 100%; height: 100%;
    }

    .icon-wrapper svg.show { opacity: 1; transform: rotate(0deg); }
    .icon-wrapper svg.exit { opacity: 0; transform: rotate(180deg); }

    .fade-in { animation: fadeIn 0.4s ease forwards; }
    @keyframes fadeIn {
      0% { opacity: 0; }
      100% { opacity: 1; }
    }

    @media (max-width: 768px) {
      body, html {
        overflow-y: auto;
        height: auto;
        min-height: 100%;
      }

      .right-panel {
        position: static;
        transform: none;
        width: 90%;
        max-width: 360px;
        margin: 30px auto 120px auto; 
        gap: 15px;
      }

      .sidebar {
        position: fixed;
        left: -260px; 
        width: 260px;
        top: 50%;
        transform: translateY(-50%);
        transition: left 0.4s cubic-bezier(0.25, 0.8, 0.25, 1);
        padding: 25px 20px;
        z-index: 1001; 
        overflow: visible;
      }

      .sidebar.active {
        left: 15px; 
      }

      .sidebar .quick-links {
        max-height: 70vh;
        overflow-y: auto;
        padding-right: 5px;
      }

      .sidebar .quick-links::-webkit-scrollbar { width: 4px; }
      .sidebar .quick-links::-webkit-scrollbar-track { background: transparent; }
      .sidebar .quick-links::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.2); border-radius: 2px; }

      .sidebar-toggle-handle {
        display: flex;
        position: absolute;
        top: 50%;
        right: -35px; 
        transform: translateY(-50%);
        width: 35px;
        height: 60px;
        background: rgba(20, 20, 20, 0.6);
        backdrop-filter: blur(15px);
        -webkit-backdrop-filter: blur(15px);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-left: none;
        border-radius: 0 12px 12px 0;
        align-items: center;
        justify-content: center;
        color: white;
        cursor: pointer;
        transition: right 0.4s ease, border-radius 0.4s ease;
      }

      .sidebar.active .sidebar-toggle-handle {
        right: 0px;
        border-left: 1px solid rgba(255, 255, 255, 0.1);
        border-right: none;
        border-radius: 12px 0 0 12px;
      }

      .sidebar.active .sidebar-toggle-handle i {
        transform: rotate(180deg);
      }

      .search-container {
        position: fixed;
        bottom: 20px;
        width: 100%;
        padding: 0 15px;
      }

      .search-box {
        width: 100%;
      }

      .weather-modal {
        padding: 20px;
        width: 95%;
      }

      .forecast-container {
        gap: 8px;
      }

      .forecast-day {
        min-width: 70px;
        padding: 10px 5px;
      }
    }
  </style>
</head>
<body>

  <div class="sidebar-overlay" id="sidebarOverlay"></div>

  <div class="right-panel">
    <div class="clock-container glass-effect">
      <div id="clock-time" title="Clique para mostrar/ocultar segundos">00:00</div>
      <div id="clock-date">Carregando data...</div>
      
      <div class="weather-widget" id="weatherWidget" title="Ver previsão para 7 dias">
        <i class="fas fa-spinner fa-spin" id="currentWeatherIcon"></i>
        <span id="currentTemp">--°C</span>
      </div>
    </div>

    <div class="today-container glass-effect">
      <div class="today-title">
        <button id="prevDayBtn" class="nav-btn" title="Anterior" disabled><i class="fas fa-chevron-left"></i></button>
        <span id="todayTitleText" class="today-title-content" title="Clique para abrir em tela cheia">
          <i class="fas fa-calendar-day"></i> Hoje
        </span>
        <button id="nextDayBtn" class="nav-btn" title="Próximo" disabled><i class="fas fa-chevron-right"></i></button>
      </div>
      <ul class="today-list" id="todayEventsList">
        <li style="text-align: center; opacity: 0.7;"><span class="no-link"><i class="fas fa-spinner fa-spin"></i> Buscando eventos...</span></li>
      </ul>
    </div>
  </div>

  <div class="sidebar glass-effect">
      <div class="sidebar-toggle-handle" title="Menu rápido">
        <i class="fas fa-chevron-right"></i>
      </div>

      <div class="quick-links">
        <a href="https://www.youtube.com"><i class="fab fa-youtube"></i>Youtube</a>
        <a href="https://www.twitch.tv"><i class="fab fa-twitch"></i>Twitch</a>
        <a href="https://www.kick.com/"><i class="fa-brands fa-kickstarter"></i>Kick</a>
        <a href="https://www.tiktok.com"><i class="fa-brands fa-tiktok"></i>TikTok</a>
        <a href="https://www.instagram.com"><i class="fab fa-instagram"></i>Instagram</a>
        <a href="https://twitter.com"><i class="fab fa-twitter"></i>Twitter</a>
        <a href="https://discord.com/channels/@me"><i class="fab fa-discord"></i>Discord</a>
        <a href="https://outlook.live.com/mail/0/"><i class="fas fa-envelope"></i>Outlook</a>
        <a href="https://mail.google.com/mail/u/0/#inbox"><i class="fas fa-envelope"></i>Gmail</a>
        <a href="https://gemini.google.com/app?hl=pt-BR"><i class="fas fa-comments"></i>Gemini</a>
        <a href="https://crowdin.com/project/hytale-game/pt-BR"><i class="fas fa-globe"></i>Crowdin</a>
      </div>
  </div>

  <div class="search-container">
    <form class="search-box glass-effect" id="searchForm" autocomplete="off">
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-search"><circle cx="11" cy="11" r="8"/><line x1="21" x2="16.65" y1="21" y2="16.65"/></svg>
      <input type="text" id="searchInput" placeholder="Pesquisar..." autocomplete="off" autofocus />
      <button type="button" class="icon-button" id="engineToggle" title="Trocar mecanismo de busca">
        <div class="icon-wrapper" id="engineWrapper"></div>
      </button>
    </form>
  </div>

  <div class="modal-overlay" id="weatherModalOverlay">
    <div class="weather-modal glass-effect">
      <button class="close-modal" id="closeModalBtn"><i class="fas fa-times"></i></button>
      <h2 class="modal-title">Previsão para 7 Dias</h2>
      <div class="forecast-container" id="forecastContainer">
      </div>
      
      <h3 style="margin-bottom: 10px; font-weight: 500; font-size: 1.1rem; text-align:center;">Radar de Chuva</h3>
      <div style="border-radius: 15px; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.3);">
        <iframe src="https://www.rainviewer.com/map.html?loc=-22.7388,-43.4921,8.788702495454777&oCS=1&c=3&o=83&lm=1&layer=radar&sm=1&sn=1&ts=2" width="100%" frameborder="0" style="border:0;height:50vh;" allowfullscreen></iframe>
      </div>
    </div>
  </div>

  <div class="modal-overlay" id="eventsModalOverlay">
    <div class="events-modal glass-effect">
      <button class="close-modal" id="closeEventsModalBtn"><i class="fas fa-times"></i></button>
      <h2 class="modal-title" id="eventsModalTitle">Eventos</h2>
      <ul class="modal-events-list" id="eventsModalList">
      </ul>
    </div>
  </div>

  <script>
    const clockTimeElement = document.getElementById('clock-time');
    let showSeconds = localStorage.getItem('showSeconds') === 'true';

    clockTimeElement.addEventListener('click', () => {
      showSeconds = !showSeconds;
      localStorage.setItem('showSeconds', showSeconds);
      updateClock();
    });

    function updateClock() {
      const now = new Date();
      const hours = String(now.getHours()).padStart(2, '0');
      const minutes = String(now.getMinutes()).padStart(2, '0');
      
      let timeString = `${hours}:${minutes}`;

      if (showSeconds) {
        const seconds = String(now.getSeconds()).padStart(2, '0');
        timeString += `:${seconds}`;
      }

      const options = { weekday: 'long', day: 'numeric', month: 'long' };
      const dateString = now.toLocaleDateString('pt-BR', options);

      clockTimeElement.textContent = timeString;
      document.getElementById('clock-date').textContent = dateString.charAt(0).toUpperCase() + dateString.slice(1);
    }
    setInterval(updateClock, 1000);
    updateClock();

    const weatherWidget = document.getElementById('weatherWidget');
    const currentWeatherIcon = document.getElementById('currentWeatherIcon');
    const currentTemp = document.getElementById('currentTemp');
    const modalOverlay = document.getElementById('weatherModalOverlay');
    const closeModalBtn = document.getElementById('closeModalBtn');
    const forecastContainer = document.getElementById('forecastContainer');

    function getWeatherIcon(code) {
      if (code === 0) return 'fa-sun';
      if (code >= 1 && code <= 3) return 'fa-cloud-sun';
      if (code === 45 || code === 48) return 'fa-smog';
      if (code >= 51 && code <= 67) return 'fa-cloud-rain';
      if (code >= 80 && code <= 82) return 'fa-cloud-showers-heavy';
      if (code >= 95 && code <= 99) return 'fa-bolt';
      if (code >= 71 && code <= 77) return 'fa-snowflake';
      return 'fa-cloud';
    }

    async function fetchWeather(lat, lon) {
      try {
        const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,weather_code&daily=weather_code,temperature_2m_max,temperature_2m_min&timezone=auto`;
        const response = await fetch(url);
        const data = await response.json();

        const currentCode = data.current.weather_code;
        const temp = Math.round(data.current.temperature_2m);
        
        currentWeatherIcon.className = `fas ${getWeatherIcon(currentCode)}`;
        currentWeatherIcon.classList.remove('fa-spin', 'fa-spinner');
        currentTemp.textContent = `${temp}°C`;

        renderForecast(data.daily);

      } catch (error) {
        console.error("Erro ao buscar clima:", error);
        currentTemp.textContent = "Erro";
      }
    }

    function renderForecast(dailyData) {
      forecastContainer.innerHTML = '';
      
      for (let i = 0; i < 7; i++) {
        const date = new Date(dailyData.time[i]);
        const dateCorrected = new Date(date.getUTCFullYear(), date.getUTCMonth(), date.getUTCDate());
        
        const dayName = i === 0 ? 'Hoje' : dateCorrected.toLocaleDateString('pt-BR', { weekday: 'short' }).replace('.','');
        const iconClass = getWeatherIcon(dailyData.weather_code[i]);
        const max = Math.round(dailyData.temperature_2m_max[i]);
        const min = Math.round(dailyData.temperature_2m_min[i]);

        const html = `
          <div class="forecast-day">
            <span class="f-day-name">${dayName}</span>
            <i class="fas ${iconClass} f-icon"></i>
            <span class="f-max">${max}°</span>
            <span class="f-min">${min}°</span>
          </div>
        `;
        forecastContainer.insertAdjacentHTML('beforeend', html);
      }
    }

    function getLocation() {
      const savedLat = localStorage.getItem('user_lat');
      const savedLon = localStorage.getItem('user_lon');

      if (savedLat && savedLon) {
        fetchWeather(savedLat, savedLon);
      } else {
        if (navigator.geolocation) {
          navigator.geolocation.getCurrentPosition((position) => {
            const lat = position.coords.latitude;
            const lon = position.coords.longitude;
            localStorage.setItem('user_lat', lat);
            localStorage.setItem('user_lon', lon);
            fetchWeather(lat, lon);
          }, (error) => {
            console.error("Erro geolocalização:", error);
            currentTemp.textContent = "Sem loc.";
          });
        } else {
          currentTemp.textContent = "N/A";
        }
      }
    }

    getLocation();

    weatherWidget.addEventListener('click', () => { modalOverlay.classList.add('active'); });
    closeModalBtn.addEventListener('click', () => { modalOverlay.classList.remove('active'); });
    modalOverlay.addEventListener('click', (e) => {
      if (e.target === modalOverlay) modalOverlay.classList.remove('active');
    });

    let eventViews = [];
    let currentViewIndex = 0;

    const prevDayBtn = document.getElementById('prevDayBtn');
    const nextDayBtn = document.getElementById('nextDayBtn');
    const todayTitleText = document.getElementById('todayTitleText');
    const eventsModalOverlay = document.getElementById('eventsModalOverlay');
    const closeEventsModalBtn = document.getElementById('closeEventsModalBtn');
    const eventsModalTitle = document.getElementById('eventsModalTitle');
    const eventsModalList = document.getElementById('eventsModalList');

    prevDayBtn.addEventListener('click', () => {
      if (currentViewIndex > 0) {
        currentViewIndex--;
        renderEventView();
      }
    });

    nextDayBtn.addEventListener('click', () => {
      if (currentViewIndex < eventViews.length - 1) {
        currentViewIndex++;
        renderEventView();
      }
    });

    todayTitleText.addEventListener('click', () => {
      const view = eventViews[currentViewIndex];
      if (!view) return;

      eventsModalTitle.innerHTML = `<i class="fas ${view.icon}"></i> ${view.label}`;
      eventsModalList.innerHTML = '';

      if (!view.events || view.events.length === 0) {
        eventsModalList.innerHTML = '<li style="text-align: center; opacity: 0.7;"><span class="no-link">Nenhum evento neste dia.</span></li>';
      } else {
        view.events.forEach(event => {
          const li = document.createElement('li');
          if (event.url) {
            const a = document.createElement('a');
            a.href = event.url;
            a.target = '_blank';
            a.rel = 'noopener noreferrer';
            a.textContent = event.nome;
            li.appendChild(a);
          } else {
            const span = document.createElement('span');
            span.className = 'no-link';
            span.textContent = event.nome;
            li.appendChild(span);
          }
          eventsModalList.appendChild(li);
        });
      }
      eventsModalOverlay.classList.add('active');
    });

    closeEventsModalBtn.addEventListener('click', () => {
      eventsModalOverlay.classList.remove('active');
    });

    eventsModalOverlay.addEventListener('click', (e) => {
      if (e.target === eventsModalOverlay) {
        eventsModalOverlay.classList.remove('active');
      }
    });

    function renderEventView() {
      const view = eventViews[currentViewIndex];
      if (!view) return;

      todayTitleText.innerHTML = `<i class="fas ${view.icon}"></i> ${view.label}`;

      prevDayBtn.disabled = currentViewIndex === 0;
      nextDayBtn.disabled = currentViewIndex === eventViews.length - 1;

      const listElement = document.getElementById('todayEventsList');
      listElement.innerHTML = '';

      if (!view.events || view.events.length === 0) {
        listElement.innerHTML = '<li style="text-align: center; opacity: 0.7;"><span class="no-link">Nenhum evento neste dia.</span></li>';
        return;
      }

      view.events.forEach(event => {
        const li = document.createElement('li');
        if (event.url) {
          const a = document.createElement('a');
          a.href = event.url;
          a.target = '_blank';
          a.rel = 'noopener noreferrer';
          a.textContent = event.nome;
          li.appendChild(a);
        } else {
          const span = document.createElement('span');
          span.className = 'no-link';
          span.textContent = event.nome;
          li.appendChild(span);
        }
        listElement.appendChild(li);
      });
    }

    async function fetchTodayEvents() {
      const listElement = document.getElementById('todayEventsList');
      try {
        const response = await fetch('https://gist.githubusercontent.com/ItsOnlyMe360/eb718d6742d510e4ac05b47645642e1e/raw/');
        if (!response.ok) throw new Error('Falha na requisição');
        
        const data = await response.json();
        eventViews = [];

        if (data.ontem) {
          eventViews.push({
            id: 'ontem',
            label: 'Ontem',
            icon: 'fa-calendar-day',
            events: data.ontem
          });
        }

        if (data.hoje) {
          eventViews.push({
            id: 'hoje',
            label: 'Hoje',
            icon: 'fa-calendar-day',
            events: data.hoje
          });
        }

        if (data.proximos && Array.isArray(data.proximos)) {
          const groups = {};
          data.proximos.forEach(item => {
            if (!groups[item.dia]) {
              groups[item.dia] = [];
            }
            groups[item.dia].push({ nome: item.nome, url: item.url });
          });

          const sortedDays = Object.keys(groups).map(Number).sort((a, b) => a - b);
          sortedDays.forEach(day => {
            eventViews.push({
              id: `dia_${day}`,
              label: `${day}`,
              icon: 'fa-calendar-alt',
              events: groups[day]
            });
          });
        }

        const todayIdx = eventViews.findIndex(v => v.id === 'hoje');
        currentViewIndex = todayIdx !== -1 ? todayIdx : 0;

        renderEventView();

      } catch (error) {
        console.error("Erro ao buscar eventos de hoje:", error);
        listElement.innerHTML = '<li style="text-align: center; opacity: 0.7;"><span class="no-link">Erro ao carregar eventos.</span></li>';
      }
    }

    fetchTodayEvents();

    const sidebar = document.querySelector('.sidebar');
    const overlay = document.getElementById('sidebarOverlay');
    const toggleHandle = document.querySelector('.sidebar-toggle-handle');

    function openSidebar() {
      sidebar.classList.add('active');
      overlay.classList.add('active');
    }

    function closeSidebar() {
      sidebar.classList.remove('active');
      overlay.classList.remove('active');
    }

    if (toggleHandle) {
      toggleHandle.addEventListener('click', (e) => {
        e.stopPropagation();
        if (sidebar.classList.contains('active')) {
          closeSidebar();
        } else {
          openSidebar();
        }
      });
    }

    overlay.addEventListener('click', closeSidebar);

    sidebar.addEventListener('click', (e) => {
      if (window.innerWidth <= 768 && !sidebar.classList.contains('active')) {
        openSidebar();
      }
    });

    const engineToggle = document.getElementById('engineToggle')
    const engineWrapper = document.getElementById('engineWrapper')
    const searchForm = document.getElementById('searchForm')
    const searchInput = document.getElementById('searchInput')

    let currentEngine = 'google'

    const icons = {
      google: `<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-globe"><circle cx="12" cy="12" r="10"/><line x1="2" x2="22" y1="12" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>`,
      youtube: `<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-youtube"><path d="M22.54 6.42a2.78 2.78 0 0 0-1.95-2C18.88 4 12 4 12 4s-6.88 0-8.59.42a2.78 2.78 0 0 0-1.95 2 29.94 29.94 0 0 0 0 11.16 2.78 2.78 0 0 0 1.95 2C5.12 20 12 20 12 20s6.88 0 8.59-.42a2.78 2.78 0 0 0 1.95-2 29.94 29.94 0 0 0 0-11.16z"/><polygon points="10 15 15 12 10 9 10 15"/></svg>`
    }

    function insertInitialIcon() {
      engineWrapper.innerHTML = icons[currentEngine]
      const icon = engineWrapper.querySelector('svg')
      icon.classList.add('fade-in')
      requestAnimationFrame(() => { icon.classList.add('show') })
    }

    engineToggle.addEventListener('click', () => {
      const currentIcon = engineWrapper.querySelector('svg')
      currentIcon.classList.remove('show')
      currentIcon.classList.add('exit')

      setTimeout(() => {
        engineWrapper.removeChild(currentIcon)
        currentEngine = currentEngine === 'google' ? 'youtube' : 'google'
        engineWrapper.insertAdjacentHTML('beforeend', icons[currentEngine])
        const newIcon = engineWrapper.querySelector('svg:last-child')
        newIcon.classList.add('fade-in')
        requestAnimationFrame(() => { newIcon.classList.add('show') })
        searchInput.placeholder = currentEngine === 'google' ? 'Pesquisar no Google...' : 'Pesquisar no YouTube...';
      }, 300)
    })

    searchForm.addEventListener('submit', (e) => {
      e.preventDefault()
      const query = encodeURIComponent(searchInput.value.trim())
      if (!query) return
      
      const url = currentEngine === 'google'
        ? `https://www.google.com/search?q=${query}`
        : `https://www.youtube.com/results?search_query=${query}`;
        
      window.location.href = url;
    })

    window.addEventListener('DOMContentLoaded', insertInitialIcon)
  </script>
</body>
</html>
